<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>نظام رصد الفحص السعودي — EBDA EDU</title>
<meta name="description" content="نظام رصد بيانات وملاحظات الفحص السعودي — EBDA EDU للتطوير والتدريب">
<link rel="icon" href="logo.jpg">
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#3d8ea3;}
  iframe{width:100%;height:100%;border:0;display:block;}

  /* رسالة احتياطية تظهر فقط إذا منع المتصفح عرض النظام داخل الصفحة */
  #fallback{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#57B1C9 0%,#3d8ea3 100%);
    font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:#fff;text-align:center;padding:24px;
  }
  #fallback .box{max-width:380px;}
  #fallback img{width:96px;height:96px;border-radius:50%;background:#fff;padding:6px;object-fit:contain;}
  #fallback h1{font-size:20px;margin:18px 0 8px;}
  #fallback p{font-size:14px;opacity:.9;margin:0 0 22px;line-height:1.8;}
  #fallback a{
    display:inline-block;background:#fff;color:#3d8ea3;padding:13px 34px;border-radius:30px;
    text-decoration:none;font-weight:700;font-size:16px;box-shadow:0 6px 18px rgba(0,0,0,.16);
  }
</style>
</head>
<body>

<iframe id="appFrame" title="نظام رصد الفحص السعودي" allow="clipboard-write"></iframe>

<div id="fallback">
  <div class="box">
    <img src="logo.jpg" alt="EBDA EDU">
    <h1>نظام رصد الفحص السعودي</h1>
    <p>لم يتمكن المتصفح من عرض النظام داخل هذه الصفحة.<br>اضغط الزر التالي لفتحه في نافذة مستقلة.</p>
    <a id="openBtn" href="#" target="_blank" rel="noopener">فتح النظام</a>
  </div>
</div>

<script>
  // رابط التطبيق المنشور — عدّله هنا فقط عند إنشاء نشر جديد
  const APP_URL = "https://script.google.com/macros/s/AKfycbwchUBSk2AMqbfOqMezGk1QNgkdeK8-EcnJMcTaW_PGE-mlT8bg_MgBw7zlGs0P-nyLnA/exec";

  const frame = document.getElementById('appFrame');
  document.getElementById('openBtn').href = APP_URL;
  frame.src = APP_URL;

  let loaded = false;
  frame.addEventListener('load', function(){ loaded = true; });

  // إذا لم يُحمّل الإطار خلال 6 ثوانٍ، تظهر الرسالة الاحتياطية
  setTimeout(function(){
    if(!loaded){ document.getElementById('fallback').style.display = 'flex'; }
  }, 6000);
</script>

</body>
</html>
